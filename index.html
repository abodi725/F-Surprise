<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مفاجأة خاصة جداً 🤔❤️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #ffe5ec, #ffb3c6);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 350px;
            width: 90%;
            z-index: 5;
            transition: all 0.5s ease;
        }

        .gif-box {
            font-size: 60px;
            margin-bottom: 20px;
            animation: bounce 1s infinite alternate;
        }

        @keyframes bounce {
            to {
                transform: translateY(-10px);
            }
        }

        h1 {
            color: #c9184a;
            font-size: 24px;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .buttons-wrapper {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 60px;
            position: relative;
        }

        .btn {
            padding: 12px 35px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        }

        #yes-btn {
            background-color: #4caf50;
            color: white;
        }

        #no-btn {
            background-color: #ff4d6d;
            color: white;
            position: absolute;
        }

        /* واجهة الرسالة النهائية المخفية */
        .success-box {
            display: none;
        }

        .couple-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #ff4d6d;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(201, 24, 74, 0.3);
        }

        .success-box h2 {
            color: #c9184a;
            font-size: 24px;
            margin-bottom: 15px;
        }

        .success-box p {
            color: #590d22;
            font-size: 17px;
            line-height: 1.6;
        }

        /* صندوق العداد */
        .counter-container {
            margin-top: 20px;
            background: #fff0f3;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #ffb3c6;
        }

        .counter-title {
            color: #590d22;
            font-size: 14px;
            display: block;
            margin-bottom: 5px;
        }

        #birthday-counter {
            font-size: 16px;
            font-weight: bold;
            color: #c9184a;
            line-height: 1.5;
        }

        /* إرشادات المسح */
        #clean-instruction {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(201, 24, 74, 0.9);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 15px;
            font-weight: bold;
            z-index: 100;
            display: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            white-space: nowrap;
        }

        /* عناصر الورود */
        .flower-particle {
            position: fixed;
            font-size: 35px;
            cursor: pointer;
            z-index: 50;
            transition: opacity 0.3s ease, transform 0.3s ease;
            transform: translate(-50%, -50%);
        }
    </style>
</head>

<body>

    <!-- عنصر الصوت للموسيقى -->
    <audio id="bg-music" src="music.mp3" loop></audio>

    <!-- نص إرشادي للمسح -->
    <div id="clean-instruction">🧹 امسحي الشاشة بإصبعكِ لإزالة الورود ورؤية المفاجأة!</div>

    <div class="container" id="main-container">
        <!-- الواجهة الأولى: السؤال -->
        <div id="question-area">
            <div class="gif-box">🥺</div>
            <h1>هل تحبينني؟ <br> (جاوبي بصراحة!)</h1>
            <div class="buttons-wrapper">
                <button class="btn" id="yes-btn" onclick="startFlowerStorm()">نعم</button>
                <button class="btn" id="no-btn">لا</button>
            </div>
        </div>

        <!-- الواجهة الثانية: تظهر بعد تنظيف الشاشة -->
        <div id="success-area" class="success-box">
            <img src="us.jpg" alt="Our Beautiful Memory" class="couple-img">
            <h2>كنت أعرف ذلك! 🥰❤️</h2>
            <p>وأنا أحبكِ جداً ولا يمكنني الاستغناء عنكِ. شكراً لأنكِ نظفتِ كل هذه الورود لتصلي إلى قلبي! دمتِ لي يا
                أجمل تفاصيلي ✨🌹</p>

            <!-- صندوق العداد التنازلي -->
            <div class="counter-container">
                <span class="counter-title">الوقت المتبقي ليوم ميلادكِ السعيد:</span>
                <span id="birthday-counter">يحسب الآن...</span>
            </div>
        </div>
    </div>
    <script>
        // 1. تحديد تاريخ عيد ميلادها (29 سبتمبر 2026)
        // شهر سبتمبر يمثله الرقم 8 لأن العد يبدأ من 0
        const BIRTHDAY_DATE = new Date(2026, 8, 29, 0, 0, 0);

        const noBtn = document.getElementById('no-btn');
        const bgMusic = document.getElementById('bg-music');
        let totalItems = 0;
        let clearedItems = 0;
        const itemsArray = [];
        let countdownInterval;

        // 2. منطق دالة هروب زر "لا"
        function moveNoButton() {
            const padding = 40;
            const screenWidth = window.innerWidth - noBtn.offsetWidth - padding;
            const screenHeight = window.innerHeight - noBtn.offsetHeight - padding;
            const randomX = Math.floor(Math.random() * screenWidth) + (padding / 2);
            const randomY = Math.floor(Math.random() * screenHeight) + (padding / 2);
            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }
        noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); moveNoButton(); });
        noBtn.addEventListener('mouseover', moveNoButton);

        // 3. دالة بدء عاصفة الورود وتشغيل الموسيقى عند الضغط على "نعم"
        function startFlowerStorm() {
            bgMusic.play().catch(error => {
                console.log("المتصفح حظر التشغيل التلقائي:", error);
            });

            document.getElementById('question-area').style.display = 'none';
            document.getElementById('clean-instruction').style.display = 'block';

            const elementsToSpawn = ['❤️', '🌹', '🌸', '💐', '💖', '🌷'];
            const rows = 12;
            const cols = 8;

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const item = document.createElement('div');
                    item.classList.add('flower-particle');
                    item.innerText = elementsToSpawn[Math.floor(Math.random() * elementsToSpawn.length)];

                    const x = (c / cols) * window.innerWidth + (Math.random() * 30);
                    const y = (r / rows) * window.innerHeight + (Math.random() * 30);

                    item.style.left = x + 'px';
                    item.style.top = y + 'px';

                    document.body.appendChild(item);
                    itemsArray.push(item);
                    totalItems++;
                }
            }

            window.addEventListener('touchmove', handleTouchMove, { passive: false });
            window.addEventListener('mousemove', handleMouseMove);
        }

        // 4. معالجة أحداث المسح وحساب التصادم
        function handleTouchMove(e) {
            e.preventDefault();
            const touch = e.touches;
            checkCollision(touch.clientX, touch.clientY);
        }

        function handleMouseMove(e) {
            if (totalItems > 0) {
                checkCollision(e.clientX, e.clientY);
            }
        }

        function checkCollision(x, y) {
            itemsArray.forEach((item) => {
                if (item.style.opacity !== '0') {
                    const rect = item.getBoundingClientRect();
                    if (x >= rect.left - 25 && x <= rect.right + 25 && y >= rect.top - 25 && y <= rect.bottom + 25) {
                        item.style.opacity = '0';
                        item.style.transform = 'translate(-50%, -50%) scale(0)';
                        clearedItems++;
                        checkProgress();
                    }
                }
            });
        }

        // 5. الانتقال للواجهة النهائية
        function checkProgress() {
            if (clearedItems / totalItems >= 0.85) {
                itemsArray.forEach(item => item.style.display = 'none');
                document.getElementById('clean-instruction').style.display = 'none';
                document.getElementById('success-area').style.display = 'block';

                window.removeEventListener('touchmove', handleTouchMove);
                window.removeEventListener('mousemove', handleMouseMove);
                totalItems = 0;

                // تشغيل العداد التنازلي
                startCountdown();
            }
        }

        // 6. دالة تشغيل العداد التنازلي (تم إصلاحها بدون علامة $)
        function startCountdown() {
            const countdownEl = document.getElementById('birthday-counter');

            countdownInterval = setInterval(() => {
                const now = new Date().getTime();
                const distance = BIRTHDAY_DATE.getTime() - now;

                if (distance < 0) {
                    clearInterval(countdownInterval);
                    countdownEl.innerHTML = "كل عام وأنتِ بخير يا جميلة! 🎂🎉";
                    countdownEl.style.color = "#4caf50";
                    return;
                }

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                // تم استبدال الـ `${}` بطريقة الدمج التقليدية لمنع الخطأ تماماً
                countdownEl.innerHTML = days + " يوم و " + hours + " ساعة و " + minutes + " دقيقة و " + seconds + " ثانية";
            }, 1000);
        }

    </script>
</body>

</html>
