<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مفاجأة خاصة جداً 🤔❤️</title>
    <link rel="stylesheet" href="style.css">    
</head>

<body>

    <!-- عنصر الصوت للموسيقى -->
    <!-- <audio id="bg-music" src="music.mp3" loop></audio> -->

    <!-- نص إرشادي للمسح -->
    <div id="clean-instruction">🧹 امسحي الشاشة بإصبعكِ لإزالة الورود ورؤية المفاجأة!</div>

    <div class="container" id="main-container">
        <!-- الواجهة الأولى: السؤال -->
        <div id="question-area">
            <div class="gif-box">🥺</div>
            <h1>هل تحبينني؟ <br> (جاوبي بصراحة!)</h1>
            <div class="buttons-wrapper">
                <button class="btn" id="yes-btn" onclick="startFlowerStorm()">نعم</button>
                <button class="btn" id="no-btn">لا</button>
            </div>
        </div>

        <!-- الواجهة الثانية: تظهر بعد تنظيف الشاشة -->
        <div id="success-area" class="success-box">
            <img src="us.jpg" alt="Our Beautiful Memory" class="couple-img">
            <h2>كنت أعرف ذلك! 🥰❤️</h2>
            <p>وأنا أحبكِ جداً ولا يمكنني الاستغناء عنكِ. شكراً لأنكِ نظفتِ كل هذه الورود لتصلي إلى قلبي! دمتِ لي يا
                أجمل تفاصيلي ✨🌹</p>

            <!-- صندوق العداد التنازلي -->
            <div class="counter-container">
                <span class="counter-title">الوقت المتبقي ليوم ميلادكِ السعيد:</span>
                <span id="birthday-counter">يحسب الآن...</span>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>

</html>
